name: publish

# GitHub Release 발행 시 PyPI 로 빌드·배포.
# 인증: PyPI Trusted Publishing(OIDC) — 토큰 불필요.
#   준비(1회): PyPI → 프로젝트 'xgen-omnifuse' → Publishing → Add a new pending publisher
#     Owner: PlateerLab / Repository: xgen-omnifuse / Workflow: publish.yml / Environment: pypi
# 토큰 방식을 쓰려면 with: { password: ${{ secrets.PYPI_API_TOKEN }} } 를 publish 스텝에 추가.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # Trusted Publishing(OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - run: pip install twine && python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
